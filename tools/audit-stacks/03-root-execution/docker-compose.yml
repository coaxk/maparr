## TEST: Service running as root (UID 0)
## EXPECTED: root_execution conflict
## SOLUTION SHOULD: Recommend non-root UID + chown guidance
services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    environment:
      - PUID=0
      - PGID=0
    volumes:
      - ./config/sonarr:/config
      - /data:/data
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - ./config/radarr:/config
      - /data:/data
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - ./config/qbit:/config
      - /data:/data
