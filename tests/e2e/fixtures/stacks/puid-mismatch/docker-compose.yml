# E2E Test Stack: puid-mismatch
# Expected: puid_pgid_mismatch (Cat B, high)
# sonarr runs as PUID=1000, qbittorrent runs as PUID=911.

services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - /data:/data
      - /config/sonarr:/config
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=911
      - PGID=911
      - TZ=America/New_York
    volumes:
      - /data:/data
      - /config/qbittorrent:/config
    restart: unless-stopped
