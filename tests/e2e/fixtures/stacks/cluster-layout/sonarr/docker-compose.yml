# E2E Test Stack: cluster-layout/sonarr
# Expected: Part of cluster layout test. One service per subfolder.
# Combined with qbittorrent subfolder, triggers no_shared_mount (Cat A).

services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - /data:/data
      - /config/sonarr:/config
    restart: unless-stopped
