## TEST: BOTH path conflicts AND permission mismatches
## EXPECTED: no_shared_mount + puid_pgid_mismatch
## SOLUTION SHOULD: Address BOTH — volume restructure + env var fix
services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - ./config/sonarr:/config
      - /media/tv:/tv
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    environment:
      - PUID=1001
      - PGID=1001
    volumes:
      - ./config/radarr:/config
      - /movies:/movies
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    environment:
      - PUID=1002
      - PGID=1002
    volumes:
      - ./config/qbit:/config
      - /downloads:/downloads
