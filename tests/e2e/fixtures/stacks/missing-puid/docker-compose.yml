# E2E Test Stack: missing-puid
# Expected: missing_puid_pgid (Cat B, medium)
# sonarr has PUID/PGID, qbittorrent has none at all.

services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - /data:/data
      - /config/sonarr:/config
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - TZ=America/New_York
    volumes:
      - /data:/data
      - /config/qbittorrent:/config
    restart: unless-stopped
