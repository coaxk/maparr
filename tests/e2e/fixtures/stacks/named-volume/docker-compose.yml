# E2E Test Stack: named-volume
# Expected: named_volume_data (Cat A, critical)
# Uses Docker named volumes instead of bind mounts for data directories.

services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - sonarr_config:/config
      - media_data:/data
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - qbit_config:/config
      - downloads_data:/downloads
    restart: unless-stopped

volumes:
  sonarr_config:
  media_data:
  qbit_config:
  downloads_data:
