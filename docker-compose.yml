# ══════════════════════════════════════════════════════════════
# MapArr v1.3 — Docker Compose
#
# Usage:
#   STACKS_DIR=/path/to/your/stacks docker compose up
#
# Or edit the STACKS_DIR default below to match your setup.
# ══════════════════════════════════════════════════════════════

services:
  maparr:
    build: .
    container_name: maparr
    restart: unless-stopped

    ports:
      - "${MAPARR_PORT:-9494}:9494"

    volumes:
      # Docker socket — lets MapArr run `docker compose config`
      # for full variable resolution. Optional but recommended.
      - ${DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock:ro

      # Your compose stacks directory. MapArr scans this read-only
      # to discover and analyze your Docker setups.
      - ${STACKS_DIR:-.}:/stacks:ro

    environment:
      MAPARR_STACKS_PATH: /stacks

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9494/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
