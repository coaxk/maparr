## TEST: Actual WSL2 mount (/mnt/c/) — SHOULD trigger WSL2 warning
## EXPECTED: wsl2_performance conflict for all services
services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - ./config/sonarr:/config
      - /mnt/c/Users/media:/data
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - ./config/radarr:/config
      - /mnt/c/Users/media:/data
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - ./config/qbit:/config
      - /mnt/c/Users/downloads:/data
