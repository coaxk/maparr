name: Tests

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Run tests
        env:
          DOCKER_HOST: "tcp://127.0.0.1:1"  # Fail Docker fast in tests
        run: python -m pytest tests/ -v --tb=short -x --ignore=tests/e2e/test_docker.py
      - name: Test summary
        if: always()
        run: python -m pytest tests/ -q --tb=no --ignore=tests/e2e/test_docker.py 2>/dev/null || true
