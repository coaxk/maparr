# E2E Test Stack: observations
# Expected: Category D observations (privileged mode, missing restart policy).
# No path or permission conflicts — just informational observations.

services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    privileged: true
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - /data:/data
      - /config/sonarr:/config

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - /data:/data
      - /config/qbittorrent:/config
    restart: unless-stopped
