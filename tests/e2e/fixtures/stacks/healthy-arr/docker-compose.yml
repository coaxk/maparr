# E2E Test Stack: healthy-arr
# Expected: No conflicts. All services share /data, same PUID/PGID/TZ/UMASK.
# Category: None (healthy)

services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
      - UMASK=002
    volumes:
      - /data:/data
      - /config/sonarr:/config
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
      - UMASK=002
    volumes:
      - /data:/data
      - /config/radarr:/config
    restart: unless-stopped
