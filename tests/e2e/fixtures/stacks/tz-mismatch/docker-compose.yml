# E2E Test Stack: tz-mismatch
# Expected: tz_mismatch (Cat B, low)
# sonarr in New York, qbittorrent in London. Same PUID.

services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - /data:/data
      - /config/sonarr:/config
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/London
    volumes:
      - /data:/data
      - /config/qbittorrent:/config
    restart: unless-stopped
