# E2E Test Stack: wsl2-paths
# Expected: wsl2_performance (Cat C, medium)
# Both services mount from /mnt/c/ — the WSL2 filesystem bridge path.

services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - /mnt/c/media/data:/data
      - /mnt/c/config/sonarr:/config
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - /mnt/c/media/data:/data
      - /mnt/c/config/qbittorrent:/config
    restart: unless-stopped
