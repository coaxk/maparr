# E2E Test Stack: remote-fs
# Expected: remote_filesystem (Cat C, medium)
# Both services mount from a CIFS/NFS network share (//ip/share).

services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - //192.168.1.10/media/data:/data
      - /config/sonarr:/config
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - //192.168.1.10/media/data:/data
      - /config/qbittorrent:/config
    restart: unless-stopped
