## TEST: Different UMASK values across services
## EXPECTED: umask_inconsistent conflict
## SOLUTION SHOULD: Recommend UMASK=002 across all services
services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    environment:
      - PUID=1000
      - PGID=1000
      - UMASK=002
    volumes:
      - ./config/sonarr:/config
      - /data:/data
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    environment:
      - PUID=1000
      - PGID=1000
      - UMASK=022
    volumes:
      - ./config/radarr:/config
      - /data:/data
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    environment:
      - PUID=1000
      - PGID=1000
      - UMASK=077
    volumes:
      - ./config/qbit:/config
      - /data:/data
