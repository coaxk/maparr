# E2E Test Stack: rpm-scenario
# Expected: path_unreachable (Cat A) — separate mount points trigger RPM wizard.
# sonarr mounts /mnt/nas/data, qbittorrent mounts /mnt/nas/downloads. No shared parent.

services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - /mnt/nas/data:/data
      - /config/sonarr:/config
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - /mnt/nas/downloads:/downloads
      - /config/qbittorrent:/config
    restart: unless-stopped
