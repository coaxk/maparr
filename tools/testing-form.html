// ─── State Management ───
const STATE_KEY = 'maparr_testing_v2';
let state = {};
try { const s = localStorage.getItem(STATE_KEY); if (s) state = JSON.parse(s); } catch(e) {}

function save() { localStorage.setItem(STATE_KEY, JSON.stringify(state)); updateProgress(); }
function getTS(id) { if (!state[id]) state[id] = { verdict:null, checks:{}, notes:'' }; return state[id]; }

// ─── DOM Builder ───
function el(tag, attrs, children) {
  const e = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k === 'cls') e.className = v;
    else if (k === 'text') e.textContent = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), v);
    else e.setAttribute(k, v);
  });
  if (children) children.forEach(c => { if (c) e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c); });
  return e;
}

function buildExpectGrid(expects) {
  const grid = el('div', {cls:'expects'});
  const healthCls = expects.health === 'green' ? 'health-green' : expects.health === 'yellow' ? 'health-yellow' : expects.health === 'red' ? 'health-red' : '';
  const items = [
    ['Conflicts', expects.conflicts, ''],
    ['Health', expects.health, healthCls],
    ['Tabs', expects.tabs, ''],
    ['Apply Fix', expects.applyFix, ''],
    ['RPM Wizard', expects.rpm, ''],
    ['Observations', expects.observations, ''],
  ];
  items.forEach(([label, value, cls]) => {
    const item = el('div', {cls:'expect-item'}, [
      el('span', {cls:'expect-label', text:label}),
      el('span', {cls:'expect-value' + (cls ? ' '+cls : ''), text:value}),
    ]);
    grid.appendChild(item);
  });
  return grid;
}

function buildCheckboxes(id) {
  const ts = getTS(id);
  const row = el('div', {cls:'checks'});
  ['conflicts','health','tabs','applyFix','rpm','ui'].forEach(key => {
    const labels = {conflicts:'Conflicts correct', health:'Health dot correct', tabs:'Tabs correct', applyFix:'Apply Fix correct', rpm:'RPM correct', ui:'UI renders clean'};
    const cb = el('input', {type:'checkbox'});
    cb.checked = !!ts.checks[key];
    cb.addEventListener('change', () => { ts.checks[key] = cb.checked; save(); });
    const label = el('label', {cls:'check-item'}, [cb, document.createTextNode(' ' + labels[key])]);
    row.appendChild(label);
  });
  return row;
}

function buildVerdictRow(id) {
  const ts = getTS(id);
  const row = el('div', {cls:'verdict-row'});
  ['pass','fail','skip'].forEach(v => {
    const cls = ts.verdict === v ? 'verdict-btn selected-' + v : 'verdict-btn';
    const btn = el('button', {cls:cls, text:v.toUpperCase(), onclick:() => {
      ts.verdict = ts.verdict === v ? null : v;
      save();
      render();
    }});
    row.appendChild(btn);
  });
  return row;
}

function buildTestCard(t) {
  const ts = getTS(t.id);
  const verdictCls = ts.verdict ? 'test-card verdict-' + ts.verdict : 'test-card';
  const card = el('div', {cls:verdictCls, id:'card_'+t.id});

  // Header
  const header = el('div', {cls:'test-header'});
  const left = el('div', null, [
    el('span', {cls:'test-id', text:t.id}),
    el('span', {cls:'test-name', text:t.name}),
  ]);
  const pathwayCls = t.pathway === 'browse' ? 'test-pathway pathway-browse' : 'test-pathway pathway-paste';
  header.appendChild(left);
  header.appendChild(el('span', {cls:pathwayCls, text:t.pathway.toUpperCase()}));
  card.appendChild(header);

  // Dir
  card.appendChild(el('div', {cls:'test-dir', text:'Load: test-stacks/' + t.dir}));

  // Description
  card.appendChild(el('div', {cls:'test-desc', text:t.desc}));

  // Paste text (if paste pathway)
  if (t.paste) {
    const pasteDiv = el('div', {cls:'paste-text', text:t.paste, onclick:() => {
      navigator.clipboard.writeText(t.paste).then(() => {
        const toast = document.getElementById('copyToast');
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 1500);
      });
    }});
    card.appendChild(pasteDiv);
  }

  // Expects
  card.appendChild(buildExpectGrid(t.expects));

  // Checkboxes
  card.appendChild(buildCheckboxes(t.id));

  // Verdict
  card.appendChild(buildVerdictRow(t.id));

  // Notes
  const notes = el('textarea', {cls:'notes-field', placeholder:'Notes (bugs, observations, screenshots...)'});
  notes.value = ts.notes || '';
  notes.addEventListener('change', () => { ts.notes = notes.value; save(); });
  notes.addEventListener('focus', () => { notes.style.minHeight = '80px'; });
  card.appendChild(notes);

  return card;
}

function render() {
  const container = document.getElementById('testContainer');
  while (container.firstChild) container.removeChild(container.firstChild);

  const sections = {};
  TESTS.forEach(t => {
    if (!sections[t.section]) sections[t.section] = [];
    sections[t.section].push(t);
  });

  for (const [section, tests] of Object.entries(sections)) {
    const sectionId = section.replace(/[^a-zA-Z0-9]/g, '_');
    const done = tests.filter(t => getTS(t.id).verdict).length;

    // Section header
    const header = el('div', {cls:'section-header', onclick:() => {
      document.getElementById('section_'+sectionId).classList.toggle('collapsed');
    }}, [
      el('h2', {text:section}),
      el('span', {cls:'section-badge', text:done + '/' + tests.length + ' complete'}),
    ]);
    container.appendChild(header);

    // Section body
    const body = el('div', {cls:'section-body', id:'section_'+sectionId});
    tests.forEach(t => body.appendChild(buildTestCard(t)));
    container.appendChild(body);
  }

  updateProgress();
}

function updateProgress() {
  const total = TESTS.length;
  const passed = TESTS.filter(t => getTS(t.id).verdict === 'pass').length;
  const failed = TESTS.filter(t => getTS(t.id).verdict === 'fail').length;
  const skipped = TESTS.filter(t => getTS(t.id).verdict === 'skip').length;
  const done = passed + failed + skipped;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;

  const fill = document.getElementById('progressFill');
  fill.style.width = pct + '%';
  fill.textContent = pct + '%';
  document.getElementById('statPass').textContent = 'Pass: ' + passed;
  document.getElementById('statFail').textContent = 'Fail: ' + failed;
  document.getElementById('statSkip').textContent = 'Skip: ' + skipped;
  document.getElementById('statRemaining').textContent = 'Remaining: ' + (total - done);
}

function toggleAll(collapse) {
  document.querySelectorAll('.section-body').forEach(e => e.classList.toggle('collapsed', collapse));
}

function exportResults() {
  const results = {
    timestamp: new Date().toISOString(),
    version: 'MapArr v1.5.1',
    summary: {
      total: TESTS.length,
      passed: TESTS.filter(t => getTS(t.id).verdict === 'pass').length,
      failed: TESTS.filter(t => getTS(t.id).verdict === 'fail').length,
      skipped: TESTS.filter(t => getTS(t.id).verdict === 'skip').length,
    },
    tests: TESTS.map(t => ({ id:t.id, name:t.name, section:t.section, pathway:t.pathway, ...getTS(t.id) })),
    failures: TESTS.filter(t => getTS(t.id).verdict === 'fail').map(t => ({
      id:t.id, name:t.name, notes:getTS(t.id).notes, checks:getTS(t.id).checks,
    })),
  };
  const blob = new Blob([JSON.stringify(results, null, 2)], {type:'application/json'});
  const a = el('a', {href:URL.createObjectURL(blob), download:'maparr-test-results-'+new Date().toISOString().slice(0,10)+'.json'});
  a.click();
}

function resetAll() {
  if (confirm('Reset ALL test results? This cannot be undone.')) {
    localStorage.removeItem(STATE_KEY);
    state = {};
    render();
  }
}

// Init
render();
</script>
</body>
</html>
